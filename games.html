<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Chess Games Tracker - Log and Store Your Chess Games"
    />
    <meta name="keywords" content="chess, games, tracker, FIDE, ratings" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Games Tracker</title>
    <link rel="icon" type="image/x-icon" href="Scripts/knight.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="Scripts/styles.css" />
    <link rel="stylesheet" href="Scripts/responsive.css" />
    <link rel="stylesheet" href="Scripts/customSelect.css" />
    <link rel="stylesheet" href="Scripts/gameEntry.css" />
    <link rel="stylesheet" href="Scripts/darkTheme.css" />
  </head>
  <body>
    <div class="container">
      <h1>Chess Games Tracker</h1>
        <div class="filters">
          <div id="search">
            <input
              type="text"
              class="fontawesome"
              id="searchInput"
              placeholder="  Search by player or tournament name"
            />
          </div>
          <div class="options">
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </div>
          <div class="dropdown">
            <a onclick="exportJSON()" class="dropdown-item">
              <div class="load">
                <i class="fa-solid fa-download"></i>
                <span style="font-size: var(--small);">Export Games</span>
              </div>
            </a>
            <a onclick="document.getElementById('fileInput').click();" class="dropdown-item">
              <div class="load">
                <i class="fa-solid fa-upload"></i>
                <span style="font-size: var(--small);">Import Games</span>
              </div>
              <input
                type="file"
                id="fileInput"
                accept=".json"
                style="display: none"
                onchange="importJSON(event)"
              />
            </a>
          </div>
        </div>
        <div id="gamesList"></div>
    </div>
    <a href="./" class="redirect tooltip">
      <i class="fa-solid fa-key"></i>
      <span class="tooltiptext">Use Player FIDE IDs For Input</span>
    </a>
    <script src="Scripts/functions.js"></script>
    <script src="Scripts/games.js"></script>
    <script src="Scripts/customSelect.js"></script>
    <script src="Scripts/darkTheme.js"></script>
    <script src="Scripts/dropdown.js"></script>
  </body>
</html>
